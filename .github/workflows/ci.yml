name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (no heavyweight backends)
        # The fast suite mocks the NNP backends, so we skip the heavy core deps
        # (torch, chgnet, sevenn, mattersim, fairchem-core) and install only what
        # the fast tests need.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps
          python -m pip install ase pytest tqdm

      - name: Run fast tests
        run: pytest

      - name: Lint
        run: |
          python -m pip install ruff
          ruff check src tests examples
