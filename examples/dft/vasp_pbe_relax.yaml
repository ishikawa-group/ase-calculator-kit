calculator: vasp

profile:
  command: "mpirun -np 32 vasp_std"
  txt: "vasp.out"

directory: "runs/vasp/relax"

parameters:
  xc: "PBE"
  pp: "PBE"
  pp_version: "64"
  encut: 520
  kpts: [4, 4, 4]
  gamma: true
  ismear: 0
  sigma: 0.05
  ediff: 1.0e-5
  ediffg: -0.02
  ibrion: 2
  nsw: 100
  isif: 3
  lwave: false
  lcharg: false
